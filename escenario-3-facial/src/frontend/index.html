<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login · EGE Haina Control de Acceso</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <div class="container" style="max-width: 420px; margin-top: 10vh;">
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <h1 class="h4 mb-1 text-center">EGE Haina</h1>
        <p class="text-muted text-center mb-4">Control de acceso facial — Escenario 3</p>
        <div id="alerta"></div>
        <form id="formulario">
          <div class="mb-3">
            <label class="form-label" for="email">Correo</label>
            <input class="form-control" type="email" id="email" required autofocus
                   placeholder="admin@egehaina.com">
          </div>
          <div class="mb-3">
            <label class="form-label" for="password">Contraseña</label>
            <input class="form-control" type="password" id="password" required>
          </div>
          <button class="btn btn-primary w-100" type="submit">Entrar</button>
        </form>
      </div>
    </div>
    <p class="text-center text-muted mt-3 small">
      Credenciales de demostración en el README del repositorio.
    </p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/app.js"></script>
  <script>
    if (Sesion.token()) {
      window.location.href = Sesion.tieneRol('Operaciones') ? 'marcar.html' : 'empleados.html';
    }

    document.getElementById('formulario').addEventListener('submit', async (evento) => {
      evento.preventDefault();
      try {
        const respuesta = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: document.getElementById('email').value,
            password: document.getElementById('password').value
          })
        });
        if (!respuesta.ok) {
          mostrarAlerta('alerta', 'Credenciales inválidas.');
          return;
        }
        const login = await respuesta.json();
        Sesion.guardar(login);
        window.location.href = login.rol === 'Operaciones' ? 'marcar.html' : 'empleados.html';
      } catch {
        mostrarAlerta('alerta', 'No se pudo conectar con la API.');
      }
    });
  </script>
</body>
</html>
