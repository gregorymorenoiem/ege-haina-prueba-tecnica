<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Empleados · EGE Haina</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <div id="nav"></div>

  <div class="container mb-5">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h1 class="h4 mb-0">Empleados</h1>
      <button class="btn btn-primary" id="botonNuevo">Nuevo empleado</button>
    </div>

    <div id="alerta"></div>

    <div class="card shadow-sm mb-3">
      <div class="card-body py-3">
        <div class="row g-2">
          <div class="col-md-4">
            <input class="form-control" id="filtroTexto" placeholder="Buscar por nombre, código o cédula">
          </div>
          <div class="col-md-4">
            <select class="form-select" id="filtroLocalidad"><option value="">Todas las localidades</option></select>
          </div>
          <div class="col-md-2">
            <button class="btn btn-outline-secondary w-100" id="botonBuscar">Buscar</button>
          </div>
        </div>
      </div>
    </div>

    <div class="card shadow-sm">
      <div class="table-responsive">
        <table class="table table-hover align-middle mb-0">
          <thead class="table-light">
            <tr>
              <th>Foto</th><th>Código</th><th>Nombre</th><th>Cédula</th><th>Cargo</th>
              <th>Localidad</th><th>Enrolado</th><th class="text-end">Acciones</th>
            </tr>
          </thead>
          <tbody id="tabla"></tbody>
        </table>
      </div>
      <div class="card-footer d-flex justify-content-between align-items-center">
        <span id="resumen" class="text-muted small"></span>
        <div>
          <button class="btn btn-sm btn-outline-secondary" id="botonAnterior">&laquo;</button>
          <span class="mx-2" id="paginaActual">1</span>
          <button class="btn btn-sm btn-outline-secondary" id="botonSiguiente">&raquo;</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal alta/edición -->
  <div class="modal fade" id="modalEmpleado" tabindex="-1">
    <div class="modal-dialog">
      <form class="modal-content" id="formularioEmpleado">
        <div class="modal-header">
          <h2 class="h5 modal-title" id="tituloModal">Nuevo empleado</h2>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div id="alertaModal"></div>
          <input type="hidden" id="empleadoId">
          <div class="row g-3">
            <div class="col-6"><label class="form-label">Código</label>
              <input class="form-control" id="codigo" required maxlength="20" placeholder="EH-0001"></div>
            <div class="col-6"><label class="form-label">Cédula</label>
              <input class="form-control" id="cedula" required maxlength="20"></div>
            <div class="col-6"><label class="form-label">Nombre</label>
              <input class="form-control" id="nombre" required maxlength="120"></div>
            <div class="col-6"><label class="form-label">Apellido</label>
              <input class="form-control" id="apellido" required maxlength="120"></div>
            <div class="col-6"><label class="form-label">Cargo</label>
              <input class="form-control" id="cargo" maxlength="120"></div>
            <div class="col-6"><label class="form-label">Localidad</label>
              <select class="form-select" id="localidad" required></select></div>
            <div class="col-12">
              <label class="form-label">Foto de carnet (jpg/png)</label>
              <input class="form-control" type="file" id="foto" accept="image/jpeg,image/png">
              <div class="form-text">Al guardarla se genera el embedding facial de referencia.</div>
              <img id="previa" class="img-thumbnail mt-2 d-none" style="max-height: 160px" alt="Vista previa">
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button type="submit" class="btn btn-primary" id="botonGuardar">Guardar</button>
        </div>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/app.js"></script>
  <script src="js/empleados.js"></script>
</body>
</html>
