<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Marcar entrada · EGE Haina</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <div id="nav"></div>

  <div class="container mb-5" style="max-width: 720px;">
    <h1 class="h4 mb-3">Marcar entrada</h1>
    <div id="alerta"></div>

    <div class="card shadow-sm mb-3">
      <div class="card-body">
        <div class="mb-3">
          <label class="form-label">Terminal</label>
          <select class="form-select" id="terminal"></select>
        </div>

        <ul class="nav nav-tabs" role="tablist">
          <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab"
            data-bs-target="#panelArchivo" type="button">Subir imagen</button></li>
          <li class="nav-item"><button class="nav-link" data-bs-toggle="tab"
            data-bs-target="#panelCamara" type="button" id="pestanaCamara">Cámara</button></li>
        </ul>

        <div class="tab-content pt-3">
          <div class="tab-pane fade show active" id="panelArchivo">
            <input class="form-control" type="file" id="imagen" accept="image/jpeg,image/png">
            <img id="previa" class="img-thumbnail mt-2 d-none" style="max-height: 220px" alt="Vista previa">
          </div>
          <div class="tab-pane fade" id="panelCamara">
            <video id="video" class="w-100 rounded bg-black" autoplay playsinline
                   style="max-height: 280px"></video>
            <canvas id="lienzo" class="d-none"></canvas>
            <div class="form-text">La imagen se captura en el momento de validar.</div>
          </div>
        </div>

        <button class="btn btn-primary w-100 mt-3" id="botonValidar">Validar y marcar</button>
      </div>
    </div>

    <div id="resultado"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/app.js"></script>
  <script src="js/marcar.js"></script>
</body>
</html>
